<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Time2Go</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .tab-bar {
      display: flex;
      gap: 4px;
      background: var(--gray-100);
      border-radius: var(--radius-md);
      padding: 4px;
      margin-bottom: 28px;
    }
    .tab-btn {
      flex: 1;
      padding: 10px;
      border: none;
      background: transparent;
      border-radius: var(--radius-sm);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--gray-400);
      cursor: pointer;
      transition: var(--transition);
    }
    .tab-btn.active {
      background: var(--white);
      color: var(--gray-800);
      box-shadow: var(--shadow-sm);
    }
  </style>
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-box">

      <div class="auth-logo">
        <img src="logoF.png" alt="Time2Go" />
        <span>Time2Go</span>
      </div>

      <div class="tab-bar">
        <button class="tab-btn" id="tabLogin">Log in</button>
        <button class="tab-btn" id="tabRegister">Create account</button>
      </div>

      <!-- Login -->
      <div id="loginForm">
        <div id="loginMsg"></div>
        <form id="loginFormEl" novalidate>
          <div class="form-group">
            <label for="loginEmail">Email</label>
            <input class="form-input" type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email" />
          </div>
          <div class="form-group">
            <label for="loginPassword">Password</label>
            <input class="form-input" type="password" id="loginPassword" placeholder="Your password" autocomplete="current-password" />
          </div>
          <button type="submit" class="btn btn-primary btn-full">Log in</button>
        </form>
      </div>

      <!-- Register -->
      <div id="registerForm" style="display:none;">
        <div id="registerMsg"></div>
        <form id="registerFormEl" novalidate>
          <div class="form-group">
            <label for="regName">Full name</label>
            <input class="form-input" type="text" id="regName" placeholder="Your name" autocomplete="name" />
          </div>
          <div class="form-group">
            <label for="regEmail">Email</label>
            <input class="form-input" type="email" id="regEmail" placeholder="you@example.com" autocomplete="email" />
          </div>
          <div class="form-group">
            <label for="regPassword">Password</label>
            <input class="form-input" type="password" id="regPassword" placeholder="At least 8 characters" autocomplete="new-password" />
          </div>
          <div class="form-group">
            <label for="regConfirm">Confirm password</label>
            <input class="form-input" type="password" id="regConfirm" placeholder="Same password again" autocomplete="new-password" />
          </div>
          <button type="submit" class="btn btn-primary btn-full">Create account</button>
        </form>
      </div>

    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
