<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notifications — Time2Go</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-layout">

    <aside class="sidebar">
      <a class="logo-wrap" href="index.html">
        <img src="logoF.png" alt="Time2Go logo" />
        <span class="logo-text">Time2Go</span>
      </a>
      <div class="logo-tagline">Know before you go</div>
      <nav>
        <a class="nav-link" href="index.html"><span class="nav-icon">🏠</span> Home</a>
        <a class="nav-link" href="favorites.html"><span class="nav-icon">❤️</span> Favorites</a>
        <a class="nav-link active" href="notifications.html"><span class="nav-icon">🔔</span> Notifications</a>
        <a class="nav-link" href="login.html"><span class="nav-icon">🔑</span> Login</a>
        <a class="nav-link" href="register.html"><span class="nav-icon">👤</span> Register</a>
      </nav>
      <div class="sidebar-footer">Placeholder data — no database yet.</div>
    </aside>

    <main class="main-content">
      <div class="page-header">
        <h1>Notifications</h1>
        <p>We'll let you know when your saved places get crowded — or clear up.</p>
      </div>

      <!-- Toggle -->
      <div class="card" style="margin-bottom:20px;">
        <div class="toggle-row" style="border:none; padding:0; background:transparent;">
          <div class="toggle-info">
            <strong>Push notifications</strong>
            <span id="notifsStatus">Loading…</span>
          </div>
          <div class="toggle-switch" id="notifsToggle"></div>
        </div>
      </div>

      <!-- List -->
      <div class="card">
        <div class="section-title" style="margin-bottom:16px;">Recent</div>
        <div id="notifsList">
          <!-- Filled by JS -->
        </div>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
